server:
  port: 8082

spring:
  application:
    name: ms-plazoleta
  datasource:
    url: jdbc:mysql://localhost:3306/bd_plazoleta?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate.format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

jwt:
