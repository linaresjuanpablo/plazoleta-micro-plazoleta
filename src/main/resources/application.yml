feign:
  usuarios:
    url: http://localhost:8083
  trazabilidad:
    url: http://localhost:8084
  mensajeria:
    url: http://localhost:8085

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
